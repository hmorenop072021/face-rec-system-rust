version: '3.8'

services:
  # 1. Base de Datos Vectorial (Escrita en Rust, alto rendimiento)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333" # API HTTP
      - "6334:6334" # API gRPC (usada por nuestro cliente de Rust)
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - face-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Nuestra API de Reconocimiento Facial (Rust)
  face-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face-recognition-api
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - QDRANT_URL=http://qdrant:6334
      - MODEL_PATH=/app/models/arcface.onnx
    volumes:
      - ./models:/app/models
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - face-net

networks:
  face-net:
    driver: bridge

volumes:
  qdrant_storage:
